<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוזה | בונה תוכן חודשי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F7F5FB;
    --card: #FFFFFF;
    --ink: #2E2A3D;
    --ink-soft: #726D87;
    --ink-faint: #ADA9BC;

    --turquoise: #6FD6E4;
    --turquoise-deep: #159AB0;
    --coral: #FFB3A8;
    --coral-deep: #E5604F;
    --purple: #C9B8F2;
    --purple-deep: #7C4FCB;
    --blue: #A9D8EF;
    --blue-deep: #2F82B8;
    --gray: #C7CAD3;
    --gray-deep: #8A8D99;

    --line: #EAE6F3;
    --shadow: 0 10px 30px rgba(60, 40, 100, 0.08);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1200px 500px at 90% -10%, rgba(111,214,228,0.16), transparent 60%),
      radial-gradient(1000px 500px at -10% 10%, rgba(201,184,242,0.18), transparent 60%),
      var(--bg);
    font-family: 'Heebo', sans-serif;
    color: var(--ink);
    padding: 32px 16px 80px;
  }

  h1,h2,h3{ font-family:'Rubik', sans-serif; margin:0; }

  .wrap{ max-width: 760px; margin: 0 auto; }

  /* ---------- Header / brand mark ---------- */
  .brandbar{
    display:flex; align-items:center; gap:14px;
    margin-bottom: 28px;
  }
  .mark{ height:48px; width:auto; flex:0 0 auto; }
  .brandbar .titles{ line-height:1.3; }
  .brandbar .titles .biz{ font-family:'Rubik'; font-weight:800; font-size:20px; letter-spacing:.2px; }
  .brandbar .titles .sub{ font-size:13px; color:var(--ink-soft); }

  /* ---------- Card shell ---------- */
  .card{
    background: var(--card);
    border-radius: 26px;
    box-shadow: var(--shadow);
    padding: 36px 34px;
    position: relative;
    overflow: hidden;
  }
  .card::before{
    content:"";
    position:absolute; inset:0 0 auto 0; height:6px;
    background: linear-gradient(90deg, var(--coral), var(--turquoise), var(--purple));
  }

  /* ---------- Stepper ---------- */
  .stepper{ display:flex; align-items:center; margin-bottom: 30px; gap:0; }
  .stepper .seg{ flex:1; height:5px; border-radius:4px; background: var(--line); margin: 0 4px; overflow:hidden; }
  .stepper .seg > i{ display:block; height:100%; width:0%; border-radius:4px;
    background: linear-gradient(90deg, var(--turquoise-deep), var(--purple-deep));
    transition: width .5s ease; }
  .stepper .dot{
    width:34px; height:34px; border-radius:50%; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    font-family:'Rubik'; font-weight:700; font-size:13px;
    border:2px solid var(--line); color: var(--ink-faint); background:#fff;
    transition: all .3s ease;
  }
  .stepper .dot.done{ background: var(--turquoise-deep); border-color:var(--turquoise-deep); color:#fff; }
  .stepper .dot.active{ background: var(--purple-deep); border-color:var(--purple-deep); color:#fff;
    box-shadow: 0 0 0 5px rgba(124,79,203,0.15); }

  .step-eyebrow{ font-size:13px; font-weight:600; color: var(--purple-deep); margin-bottom:6px; letter-spacing:.3px; }
  .step-title{ font-size:23px; font-weight:700; margin-bottom: 22px; }

  .field{ margin-bottom: 20px; }
  .field label{ display:block; font-size:14.5px; font-weight:600; margin-bottom:7px; color: var(--ink); }
  .field .hint{ font-size:12.5px; color: var(--ink-faint); margin-top:5px; }
  .field textarea, .field input[type=text], .field input[type=month]{
    width:100%; border:1.5px solid var(--line); border-radius:14px;
    padding: 12px 14px; font-family:'Heebo'; font-size:15px; color:var(--ink);
    background: #FCFBFE; resize: vertical; min-height: 46px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .field textarea{ min-height: 78px; }
  .field textarea:focus, .field input:focus{
    outline:none; border-color: var(--turquoise-deep);
    box-shadow: 0 0 0 4px rgba(21,154,176,0.12);
  }

  .actions{ display:flex; justify-content:space-between; align-items:center; margin-top: 28px; }
  .btn{
    font-family:'Rubik'; font-weight:600; font-size:15px; cursor:pointer;
    border:none; border-radius:999px; padding: 13px 26px;
    display:inline-flex; align-items:center; gap:8px;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{
    background: linear-gradient(90deg, var(--turquoise-deep), var(--purple-deep));
    color:#fff; box-shadow: 0 8px 20px rgba(124,79,203,0.28);
  }
  .btn-primary:hover{ box-shadow: 0 10px 24px rgba(124,79,203,0.38); }
  .btn-ghost{ background: transparent; color: var(--ink-soft); }
  .btn-ghost:hover{ color: var(--ink); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

  /* ---------- Loading ---------- */
  .loading-wrap{ text-align:center; padding: 60px 20px; }
  .spinner{
    width:52px; height:52px; margin:0 auto 22px; border-radius:50%;
    border: 5px solid var(--line); border-top-color: var(--purple-deep);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .loading-msg{ font-size:15px; color: var(--ink-soft); font-weight:500; }

  .error-box{
    background: #FFF3F1; border: 1.5px solid #FFD3CC; color: var(--coral-deep);
    border-radius: 14px; padding: 16px 18px; font-size: 14px; margin-top: 16px;
  }

  /* ---------- Calendar view ---------- */
  .cal-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 6px; }
  .cal-head h2{ font-size:26px; }
  .cal-head .biz-tag{ font-size:13.5px; color:var(--ink-soft); }
  .cal-note{
    background: linear-gradient(90deg, rgba(111,214,228,0.14), rgba(201,184,242,0.14));
    border-radius:14px; padding:12px 16px; font-size:13.5px; color:var(--ink-soft);
    margin: 14px 0 22px; border: 1px solid var(--line);
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft); }
  .legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; }

  .grid{ display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; }
  .grid .wd{ text-align:center; font-size:12.5px; font-weight:600; color: var(--ink-faint); padding-bottom:4px; }
  .day{
    position:relative; min-height: 92px; border-radius:14px; padding:8px;
    border:1.5px solid var(--line); background:#FCFBFE;
    display:flex; flex-direction:column; gap:6px;
  }
  .day.out{ opacity:.35; }
  .day .num{ font-size:12px; font-weight:600; color: var(--ink-faint); }
  .post-chip{
    border-radius:10px; padding:6px 8px; font-size:11.5px; font-weight:600;
    cursor:pointer; line-height:1.35; border:none; text-align:right;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .post-chip:hover{ transform: translateY(-2px); box-shadow: 0 6px 14px rgba(60,40,100,0.15); }
  .post-chip .ptype{ display:block; font-size:9.5px; font-weight:700; opacity:.75; margin-bottom:2px; }

  .cal-footer{ display:flex; justify-content:center; margin-top:30px; }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background: rgba(46,42,61,0.45);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal{
    background:#fff; border-radius:22px; max-width:560px; width:100%;
    max-height: 86vh; overflow-y:auto; padding: 30px 30px 26px; box-shadow: var(--shadow);
    position:relative;
  }
  .modal .close{
    position:absolute; top:18px; left:18px; background:var(--line); border:none;
    width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:15px; color:var(--ink-soft);
  }
  .modal .badge{
    display:inline-block; font-size:11.5px; font-weight:700; padding:5px 12px; border-radius:999px; margin-bottom:12px;
  }
  .modal h3{ font-size:19px; margin-bottom:4px; }
  .modal .date-line{ font-size:13px; color:var(--ink-faint); margin-bottom:18px; }
  .modal textarea{
    width:100%; min-height:220px; border:1.5px solid var(--line); border-radius:14px;
    padding:14px; font-family:'Heebo'; font-size:14.5px; line-height:1.7; color:var(--ink);
    background:#FCFBFE; resize:vertical;
  }
  .modal textarea:focus{ outline:none; border-color: var(--turquoise-deep); }
  .modal .modal-actions{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .btn-sm{ font-size:13.5px; padding:9px 18px; }
  .btn-outline{ background:#fff; border:1.5px solid var(--line); color:var(--ink-soft); }
  .btn-outline:hover{ border-color: var(--purple-deep); color:var(--purple-deep); }

  .copied-flag{ font-size:12.5px; color: var(--turquoise-deep); font-weight:600; }

  @media (max-width:600px){
    .card{ padding:26px 18px; }
    .grid{ gap:5px; }
    .day{ min-height:78px; padding:5px; border-radius:10px; }
    .post-chip{ font-size:10px; padding:4px 5px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brandbar">
    <img class="mark" src="logo.png" alt="מוזה - ייעוץ, שיווק ומיתוג">
    <div class="titles">
      <div class="biz">בונה תוכן חודשי</div>
      <div class="sub">שאלון קצר → לוח תוכן מוכן לחודש הקרוב</div>
    </div>
  </div>

  <div class="card" id="cardRoot"></div>

</div>

<div id="modalLayer"></div>

<script>
/* ======================= DATA / STATE ======================= */

const STEPS = [
  {
    eyebrow: "שלב 1 מתוך 5",
    title: "העסק שלך",
    fields: [
      {key:"bizName", label:"שם העסק", type:"text", placeholder:"לדוגמה: מוזה"},
      {key:"niche", label:"במה עוסק העסק, בגדול", type:"textarea", placeholder:"תחום, קהל, מה מוכרים"},
      {key:"goal", label:"מה מטרת התוכן החודש?", type:"textarea", placeholder:"מודעות, לידים, מכירות, חיזוק אמון..."}
    ]
  },
  {
    eyebrow: "שלב 2 מתוך 5",
    title: "קהל היעד",
    fields: [
      {key:"persona", label:"תארי את הלקוח האידיאלי", type:"textarea", placeholder:"גיל, מצב, סגנון חיים, מה מעסיק אותו"},
      {key:"desire", label:"מה קהל היעד הכי רוצה להשיג או להרגיש?", type:"textarea"},
      {key:"fear", label:"ממה קהל היעד מפחד?", type:"textarea", placeholder:"החיתוך הפסיכולוגי - הפחד האמיתי מאחורי ההיסוס"},
      {key:"avoid", label:"ממה קהל היעד נמנע, מה הוא דוחה לעשות?", type:"textarea"}
    ]
  },
  {
    eyebrow: "שלב 3 מתוך 5",
    title: "המוצר או השירות",
    fields: [
      {key:"product", label:"מה המוצר או השירות שברצונך לקדם החודש?", type:"textarea"},
      {key:"howItWorks", label:"איך זה עובד בפועל?", type:"textarea", placeholder:"תהליך, שימוש, מה מקבלים"},
      {key:"unique", label:"מה מייחד אתכם מהמתחרים?", type:"textarea"}
    ]
  },
  {
    eyebrow: "שלב 4 מתוך 5",
    title: "תועלות והתנגדויות",
    fields: [
      {key:"benefits", label:"מהן 2-3 התועלות המרכזיות ללקוח?", type:"textarea"},
      {key:"objections", label:"מה ההתנגדויות הכי נפוצות שאת שומעת לפני רכישה?", type:"textarea"},
      {key:"specialDates", label:"יש מבצע, אירוע או תאריך מיוחד החודש שכדאי להתייחס אליו?", type:"textarea", placeholder:"לא חובה"}
    ]
  },
  {
    eyebrow: "שלב 5 מתוך 5",
    title: "טון וסגנון",
    fields: [
      {key:"tone", label:"2-3 מילים שמתארות את הטון של המותג", type:"text", placeholder:"לדוגמה: חם, מקצועי, ישיר"},
      {key:"avoidTopics", label:"יש משהו שחשוב לא לכתוב או לגעת בו?", type:"textarea", placeholder:"לא חובה"}
    ]
  }
];

let currentStep = 0;
let formData = {};
let monthSkeleton = null; // {year, month, monthName, posts:[{date,type,title}], note}
let postCache = {}; // date+type+title -> generated text

const TYPE_COLORS = [
  {bg:"#DFF6F8", fg:"#0E7A8C"}, // turquoise
  {bg:"#F3EBFF", fg:"#6B3FB0"}, // purple
  {bg:"#FFE7E2", fg:"#C74C3B"}, // coral
  {bg:"#E4F1FA", fg:"#26688F"}, // blue
  {bg:"#EDEEF2", fg:"#5B5E6B"}  // gray
];
function colorFor(typeStr){
  let h = 0;
  for(let i=0;i<typeStr.length;i++){ h = (h*31 + typeStr.charCodeAt(i)) % 999983; }
  return TYPE_COLORS[h % TYPE_COLORS.length];
}

const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const HEB_WEEKDAYS = ["א","ב","ג","ד","ה","ו","ש"];

/* ======================= RENDER: WIZARD ======================= */

function renderStepper(){
  let html = '<div class="stepper">';
  STEPS.forEach((s, i)=>{
    const cls = i < currentStep ? "done" : (i===currentStep ? "active" : "");
    html += `<div class="dot ${cls}">${i < currentStep ? "✓" : i+1}</div>`;
    if(i < STEPS.length - 1){
      const fillPct = i < currentStep ? 100 : 0;
      html += `<div class="seg"><i style="width:${fillPct}%"></i></div>`;
    }
  });
  html += '</div>';
  return html;
}

function renderWizard(){
  const step = STEPS[currentStep];
  let fieldsHtml = "";
  step.fields.forEach(f=>{
    const val = formData[f.key] || "";
    if(f.type === "textarea"){
      fieldsHtml += `
        <div class="field">
          <label>${f.label}</label>
          <textarea data-key="${f.key}" placeholder="${f.placeholder||''}">${val}</textarea>
        </div>`;
    } else {
      fieldsHtml += `
        <div class="field">
          <label>${f.label}</label>
          <input type="text" data-key="${f.key}" placeholder="${f.placeholder||''}" value="${val}">
        </div>`;
    }
  });

  const isLast = currentStep === STEPS.length - 1;

  const html = `
    ${renderStepper()}
    <div class="step-eyebrow">${step.eyebrow}</div>
    <div class="step-title">${step.title}</div>
    ${fieldsHtml}
    <div class="actions">
      <button class="btn btn-ghost" id="btnBack" ${currentStep===0 ? "disabled" : ""}>→ חזרה</button>
      <button class="btn btn-primary" id="btnNext">${isLast ? "בניית לוח התוכן" : "המשך"} ←</button>
    </div>
  `;
  document.getElementById("cardRoot").innerHTML = html;

  document.querySelectorAll("[data-key]").forEach(el=>{
    el.addEventListener("input", e=>{ formData[e.target.dataset.key] = e.target.value; });
  });
  document.getElementById("btnBack").addEventListener("click", ()=>{
    if(currentStep>0){ currentStep--; renderWizard(); window.scrollTo({top:0,behavior:"smooth"}); }
  });
  document.getElementById("btnNext").addEventListener("click", ()=>{
    if(isLast){ generateMonthSkeleton(); }
    else { currentStep++; renderWizard(); window.scrollTo({top:0,behavior:"smooth"}); }
  });
}

/* ======================= LOADING STATE ======================= */

function renderLoading(msg){
  document.getElementById("cardRoot").innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-msg">${msg}</div>
    </div>`;
}

function renderError(msg, retryFn){
  document.getElementById("cardRoot").innerHTML = `
    <div class="loading-wrap">
      <div class="error-box">${msg}</div>
      <div style="margin-top:18px;">
        <button class="btn btn-primary" id="btnRetry">לנסות שוב</button>
      </div>
    </div>`;
  document.getElementById("btnRetry").addEventListener("click", retryFn);
}

/* ======================= AI CALLS ======================= */

async function callClaude(systemPrompt, userPrompt){
  // הקריאה עוברת דרך פונקציית השרת שלנו (Netlify Function), לא ישירות ל-Anthropic.
  // מפתח ה-API יושב בצד השרת בלבד, לעולם לא בקוד הזה.
  const response = await fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: systemPrompt, message: userPrompt })
  });
  const data = await response.json();
  if(!response.ok){ throw new Error(data.error || "שגיאת רשת בפנייה לשרת"); }
  const textBlock = (data.content || []).find(b=>b.type==="text");
  if(!textBlock){ throw new Error("לא התקבלה תשובה מהמודל"); }
  return textBlock.text;
}

function buildBusinessContext(){
  return `
שם העסק: ${formData.bizName || "לא צוין"}
תחום: ${formData.niche || "לא צוין"}
מטרת התוכן החודש: ${formData.goal || "לא צוין"}
קהל יעד: ${formData.persona || "לא צוין"}
מה קהל היעד רוצה: ${formData.desire || "לא צוין"}
ממה קהל היעד מפחד: ${formData.fear || "לא צוין"}
ממה קהל היעד נמנע: ${formData.avoid || "לא צוין"}
המוצר/שירות המרכזי החודש: ${formData.product || "לא צוין"}
איך זה עובד: ${formData.howItWorks || "לא צוין"}
מה מייחד מהמתחרים: ${formData.unique || "לא צוין"}
תועלות מרכזיות: ${formData.benefits || "לא צוין"}
התנגדויות נפוצות: ${formData.objections || "לא צוין"}
תאריך/אירוע מיוחד החודש: ${formData.specialDates || "אין"}
טון המותג: ${formData.tone || "לא צוין"}
דברים להימנע מהם: ${formData.avoidTopics || "אין"}
`.trim();
}

function getTargetMonth(){
  const today = new Date();
  let year = today.getFullYear();
  let month = today.getMonth() + 1; // next month, 0-indexed
  if(month > 11){ month = 0; year++; }
  return {year, month}; // month is 0-indexed
}

async function generateMonthSkeleton(){
  renderLoading("בונה עבורך את לוח התוכן לחודש הקרוב...");
  const {year, month} = getTargetMonth();
  const monthName = HEB_MONTHS[month];

  const system = `אתה אסטרטג תוכן שבונה לוחות תוכן חודשיים לרשתות חברתיות (פייסבוק/אינסטגרם) לבעלי עסקים קטנים בישראל.
אתה מחזיר אך ורק JSON תקין, ללא טקסט נוסף, ללא Markdown, ללא הסברים.
מבנה חובה:
{"note":"משפט אחד קצר עם תובנה או טיפ לחודש הזה, בהתאם לעסק ולתאריכים המיוחדים שצוינו","posts":[{"date":"YYYY-MM-DD","type":"סוג הפוסט","title":"כותרת קצרה עד 6 מילים לנושא הפוסט הספציפי"}]}
כללים:
- החודש הוא ${monthName} ${year}, שנה זו ${year}, חודש מספר ${month+1}.
- תכנן בין 8 ל-12 פוסטים לאורך החודש, בפריסה של כ-2-3 פוסטים בשבוע, בימים א'-ה' בעיקר (שבוע מתחיל ביום ראשון).
- גוון בין סוגי פוסטים: טיפ, סיפור מקרה, המלצת לקוח, עדכון מהתחום, סיפור אישי, עדכון מהעסק, מענה להתנגדות, שאלה לקהל.
- כל כותרת חייבת להיות ספציפית לעסק הזה, לא כללית.
- אם צוין תאריך או אירוע מיוחד, שבץ פוסט רלוונטי סביבו.
- תאריכים בפורמט YYYY-MM-DD בתוך החודש ${monthName} בלבד.`;

  const user = `פרטי העסק:\n${buildBusinessContext()}\n\nבנה את לוח התוכן לחודש ${monthName} ${year}.`;

  try{
    const raw = await callClaude(system, user);
    const clean = raw.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    monthSkeleton = { year, month, monthName, posts: parsed.posts || [], note: parsed.note || "" };
    renderCalendar();
  } catch(err){
    console.error(err);
    renderError("לא הצלחתי לבנות את לוח התוכן. ייתכן שיש בעיית רשת מול ה-API.", generateMonthSkeleton);
  }
}

async function generatePostCopy(post){
  const cacheKey = post.date + "|" + post.type + "|" + post.title;
  if(postCache[cacheKey]) return postCache[cacheKey];

  const system = `את/ה כותב/ת תוכן שיווקי בעברית טבעית וזורמת, בלי קלישאות, בלי אימוג'ים.
משפטים קצרים וממוקדים. טון מקצועי אבל אישי. התוכן צריך להישמע כאילו בעל/ת העסק כתבו אותו בעצמם, לא כמו טקסט שנוצר על ידי AI.
כשרלוונטי, אפשר לשלב מונחי שיווק באנגלית בצורה טבעית (Lead, Retargeting, Advantage+ וכו').
תפקידך לכתוב פוסט שלם ומוכן להעלאה לפייסבוק/אינסטגרם, כ-70-130 מילים, בהתאם לסוג הפוסט ולנושא שצוינו.
החזר אך ורק את טקסט הפוסט עצמו, ללא כותרות, ללא הסברים, ללא Markdown.`;

  const user = `פרטי העסק:\n${buildBusinessContext()}\n\nכתוב עכשיו פוסט מסוג "${post.type}" בנושא: "${post.title}".`;

  const text = await callClaude(system, user);
  postCache[cacheKey] = text;
  return text;
}

/* ======================= RENDER: CALENDAR ======================= */

function renderCalendar(){
  const {year, month, monthName, posts, note} = monthSkeleton;

  const postsByDate = {};
  posts.forEach(p=>{ postsByDate[p.date] = postsByDate[p.date] || []; postsByDate[p.date].push(p); });

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0=Sunday
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  let cells = [];
  for(let i=0;i<startWeekday;i++){
    cells.push({dayNum: daysInPrevMonth - startWeekday + i + 1, out:true});
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({dayNum:d, out:false, dateStr, posts: postsByDate[dateStr] || []});
  }
  while(cells.length % 7 !== 0){
    cells.push({dayNum: cells.length - (startWeekday+daysInMonth) + 1, out:true});
  }

  let legendTypes = [...new Set(posts.map(p=>p.type))];
  let legendHtml = legendTypes.map(t=>{
    const c = colorFor(t);
    return `<span><i style="background:${c.fg}"></i>${t}</span>`;
  }).join("");

  let gridHtml = HEB_WEEKDAYS.map(d=>`<div class="wd">${d}</div>`).join("");
  cells.forEach(cell=>{
    if(cell.out){
      gridHtml += `<div class="day out"><div class="num">${cell.dayNum}</div></div>`;
    } else {
      let chips = (cell.posts||[]).map(p=>{
        const c = colorFor(p.type);
        const safe = encodeURIComponent(JSON.stringify(p));
        return `<div class="post-chip" style="background:${c.bg};color:${c.fg}" data-post="${safe}">
                  <span class="ptype">${p.type}</span>${p.title}
                </div>`;
      }).join("");
      gridHtml += `<div class="day"><div class="num">${cell.dayNum}</div>${chips}</div>`;
    }
  });

  const html = `
    <div class="cal-head">
      <h2>${monthName} ${year}</h2>
      <div class="biz-tag">${formData.bizName || ""}</div>
    </div>
    ${note ? `<div class="cal-note">💡 ${note}</div>` : ""}
    <div class="legend">${legendHtml}</div>
    <div class="grid">${gridHtml}</div>
    <div class="cal-footer">
      <button class="btn btn-ghost" id="btnStartOver">↻ להתחיל שאלון חדש</button>
    </div>
  `;
  document.getElementById("cardRoot").innerHTML = html;

  document.querySelectorAll(".post-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const post = JSON.parse(decodeURIComponent(chip.dataset.post));
      openModal(post);
    });
  });
  document.getElementById("btnStartOver").addEventListener("click", ()=>{
    if(confirm("להתחיל שאלון חדש? הנתונים הנוכחיים יימחקו.")){
      formData = {}; currentStep = 0; monthSkeleton = null; postCache = {};
      renderWizard();
    }
  });
}

/* ======================= MODAL ======================= */

function fmtHebDate(dateStr){
  const [y,m,d] = dateStr.split("-").map(Number);
  const wd = HEB_WEEKDAYS[new Date(y, m-1, d).getDay()];
  return `יום ${wd}, ${d} ב${HEB_MONTHS[m-1]}`;
}

function openModal(post){
  const c = colorFor(post.type);
  const layer = document.getElementById("modalLayer");
  layer.innerHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <button class="close" id="modalClose">✕</button>
        <span class="badge" style="background:${c.bg};color:${c.fg}">${post.type}</span>
        <h3>${post.title}</h3>
        <div class="date-line">${fmtHebDate(post.date)}</div>
        <div id="modalBody">
          <div class="loading-wrap" style="padding:30px 0;">
            <div class="spinner"></div>
            <div class="loading-msg">כותב עבורך את הפוסט...</div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalBackdrop").addEventListener("click", e=>{
    if(e.target.id === "modalBackdrop") closeModal();
  });

  generatePostCopy(post).then(text=>{
    renderModalBody(post, text);
  }).catch(err=>{
    console.error(err);
    document.getElementById("modalBody").innerHTML = `
      <div class="error-box">לא הצלחתי לכתוב את הפוסט הזה. אפשר לנסות שוב.</div>
      <div class="modal-actions"><button class="btn btn-primary btn-sm" id="modalRetry">לנסות שוב</button></div>
    `;
    document.getElementById("modalRetry").addEventListener("click", ()=>openModal(post));
  });
}

function renderModalBody(post, text){
  document.getElementById("modalBody").innerHTML = `
    <textarea id="postText">${text}</textarea>
    <div class="modal-actions">
      <button class="btn btn-primary btn-sm" id="btnCopy">העתקת הפוסט</button>
      <button class="btn btn-outline btn-sm" id="btnRegen">כתיבה מחדש</button>
      <span class="copied-flag" id="copiedFlag" style="display:none;">✓ הועתק</span>
    </div>
  `;
  document.getElementById("btnCopy").addEventListener("click", ()=>{
    const ta = document.getElementById("postText");
    ta.select();
    navigator.clipboard.writeText(ta.value).then(()=>{
      const flag = document.getElementById("copiedFlag");
      flag.style.display = "inline";
      setTimeout(()=>{ flag.style.display = "none"; }, 2000);
    });
  });
  document.getElementById("btnRegen").addEventListener("click", ()=>{
    const cacheKey = post.date + "|" + post.type + "|" + post.title;
    delete postCache[cacheKey];
    document.getElementById("modalBody").innerHTML = `
      <div class="loading-wrap" style="padding:30px 0;">
        <div class="spinner"></div>
        <div class="loading-msg">כותב גרסה חדשה...</div>
      </div>`;
    generatePostCopy(post).then(t=>renderModalBody(post, t));
  });
}

function closeModal(){ document.getElementById("modalLayer").innerHTML = ""; }

/* ======================= INIT ======================= */
renderWizard();
</script>
